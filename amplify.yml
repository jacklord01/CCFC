version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -E 'DATABASE_URL|DIRECT_URL|NEXTAUTH_SECRET|NEXTAUTH_URL|CONTENTFUL_SPACE_ID|CONTENTFUL_ACCESS_TOKEN|CONTENTFUL_PREVIEW_TOKEN|CRON_SECRET|S3_ACCESS_KEY_ID|S3_SECRET_ACCESS_KEY|S3_REGION|S3_BUCKET_NAME|WEB3FORMS_ACCESS_KEY' >> .env
    build:
      commands:
        - npx prisma generate
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
